name: backend-tests

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend-tests.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-tests.yml"

jobs:
  pytest:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: deliverypilot
          POSTGRES_PASSWORD: deliverypilot
          POSTGRES_DB: deliverypilot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U deliverypilot"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pipx install poetry

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Write test .env
        run: |
          cat > .env <<EOF
          ENVIRONMENT=test
          DATABASE_URL=postgresql+asyncpg://deliverypilot:deliverypilot@localhost:5432/deliverypilot_test
          TEST_DATABASE_URL=postgresql+asyncpg://deliverypilot:deliverypilot@localhost:5432/deliverypilot_test
          REDIS_URL=redis://localhost:6379/0
          JWT_SECRET=ci-only-secret-never-used-outside-this-workflow
          EOF

      - name: Run tests
        run: poetry run pytest -v
